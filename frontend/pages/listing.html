<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Details — Honehube</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .detail-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #f0f0f0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 20px;
      transition: background 0.3s;
    }
    .back-btn:hover {
      background: #e0e0e0;
    }
    .detail-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .detail-img {
      width: 100%;
      height: 400px;
      background: #f8f9fa;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .detail-img-placeholder {
      font-size: 120px;
      opacity: 0.3;
    }
    .detail-info h1 {
      margin: 10px 0;
      font-size: 32px;
      color: #333;
    }
    .detail-price {
      font-size: 36px;
      font-weight: bold;
      color: #667eea;
      margin: 15px 0;
    }
    .detail-category {
      color: #666;
      margin-bottom: 20px;
    }
    .detail-desc {
      line-height: 1.6;
      color: #555;
      margin-bottom: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .seller-box {
      padding: 15px;
      background: #f0f0f0;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .purchase-request-box {
      background: #f8f9fa;
      padding: 25px;
      border-radius: 12px;
      margin-top: 20px;
      border: 2px solid #667eea;
    }
    .purchase-request-box h3 {
      margin-top: 0;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #333;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .form-group small {
      display: block;
      margin-top: 5px;
      color: #666;
      font-size: 12px;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
    }
    .checkbox-group input[type="checkbox"] {
      width: auto;
    }
    .alert {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
    }
    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .alert-info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    .price-comparison {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: white;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .price-item {
      text-align: center;
    }
    .price-item-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }
    .price-item-value {
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }
    .savings {
      color: #28a745;
      font-size: 14px;
      margin-top: 5px;
    }
    @media (max-width: 768px) {
      .detail-container {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .detail-img {
        height: 300px;
      }
    }
  </style>
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="detail-page" id="detail-page">
  <button class="back-btn" onclick="history.back()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Browse
  </button>
  <div id="detail-content"><p class="loading-msg">Loading item details...</p></div>
</div>

<script src="../assets/js/store.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/navbar.js"></script>
<script>
  const listingId = new URLSearchParams(location.search).get('id');
  if (!listingId) location.href = 'index.html';

  let currentUser = null;
  let currentListing = null;

  async function init() {
    renderNavbar();
    await HybridStore.init();
    currentUser = await HybridStore.getCurrentUser();
    await loadListing();
  }

  async function loadListing() {
    const page = document.getElementById('detail-content');
    
    if (HybridStore.useAPI) {
      const result = await API.getListing(listingId);
      if (result.success) {
        currentListing = result.listing;
      } else {
        page.innerHTML = '<p class="empty-msg">Item not found.</p>';
        return;
      }
    } else {
      currentListing = Store.getListing(listingId);
      if (!currentListing) {
        page.innerHTML = '<p class="empty-msg">Item not found.</p>';
        return;
      }
    }

    displayListing();
  }

  function displayListing() {
    const l = currentListing;
    const page = document.getElementById('detail-content');

    const isAvailable = l.status === 'active';
    const canPurchase = currentUser && currentUser.role !== 'admin' && isAvailable;

    page.innerHTML = `
      <div class="detail-container">
        <div class="detail-img">
          ${l.image ? `<img src="${l.image}" alt="${l.title}" onerror="this.parentElement.innerHTML='<div class=\\'detail-img-placeholder\\'>📱</div>'" />` : `<div class="detail-img-placeholder">📱</div>`}
        </div>
        <div class="detail-info">
          <div>
            <span class="badge badge-${l.condition_type}">${l.condition_type}</span>
            ${!isAvailable ? `<span class="badge badge-sold" style="margin-left:8px">${l.status}</span>` : ''}
          </div>
          <h1>${l.title}</h1>
          <p class="detail-price">K${parseFloat(l.price).toFixed(2)}</p>
          <p class="detail-category">📦 Category: ${l.category}</p>
          
          ${l.description ? `
            <div class="detail-desc">
              <strong>Description:</strong><br>
              ${l.description}
            </div>
          ` : ''}
          
          <div class="seller-box">
            <strong>👤 Seller:</strong> ${l.seller_name || 'Admin'}
          </div>

          ${!isAvailable ? `
            <div class="alert alert-info">
              <strong>This item is no longer available.</strong><br>
              Status: ${l.status.charAt(0).toUpperCase() + l.status.slice(1)}
            </div>
          ` : ''}

          ${!currentUser && isAvailable ? `
            <div class="alert alert-info">
              <strong>Want to buy this item?</strong><br>
              Please <a href="login.html" style="color: #667eea; text-decoration: underline;">login</a> or 
              <a href="register.html" style="color: #667eea; text-decoration: underline;">register</a> to send a purchase request.
            </div>
          ` : ''}

          ${canPurchase ? `
            <div class="purchase-request-box">
              <h3>💰 Request to Buy</h3>
              <div id="request-alert"></div>
              
              <div class="form-group">
                <label>Your Offer Price (K) - Optional</label>
                <input type="number" id="offered-price" min="0.01" step="0.01" placeholder="Leave empty to buy at original price" />
                <small>Original price: K${parseFloat(l.price).toFixed(2)}. You can suggest a lower price for negotiation.</small>
              </div>

              <div id="price-comparison" style="display: none;"></div>

              <div class="form-group">
                <label>Message (Optional)</label>
                <textarea id="request-message" placeholder="Hi, I'm interested in this item..."></textarea>
                <small>Add any questions or comments for the seller.</small>
              </div>

              <div class="checkbox-group">
                <input type="checkbox" id="agree-terms" />
                <label for="agree-terms" style="font-weight: normal; margin: 0;">I agree to the terms and conditions</label>
              </div>

              <button class="btn btn-primary" onclick="sendPurchaseRequest()" style="width: 100%;">
                📧 Send Purchase Request
              </button>
            </div>
          ` : ''}
        </div>
      </div>
    `;

    // Add price comparison listener
    if (canPurchase) {
      document.getElementById('offered-price').addEventListener('input', updatePriceComparison);
    }
  }

  function updatePriceComparison() {
    const offeredPrice = parseFloat(document.getElementById('offered-price').value);
    const originalPrice = parseFloat(currentListing.price);
    const comparisonDiv = document.getElementById('price-comparison');

    if (offeredPrice && offeredPrice > 0 && offeredPrice < originalPrice) {
      const savings = originalPrice - offeredPrice;
      const savingsPercent = ((savings / originalPrice) * 100).toFixed(1);

      comparisonDiv.style.display = 'block';
      comparisonDiv.innerHTML = `
        <div class="price-item">
          <div class="price-item-label">Original Price</div>
          <div class="price-item-value">K${originalPrice.toFixed(2)}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">Your Offer</div>
          <div class="price-item-value">K${offeredPrice.toFixed(2)}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">You Save</div>
          <div class="price-item-value savings">K${savings.toFixed(2)}</div>
          <div class="savings">(${savingsPercent}% off)</div>
        </div>
      `;
    } else {
      comparisonDiv.style.display = 'none';
    }
  }

  async function sendPurchaseRequest() {
    const alertEl = document.getElementById('request-alert');
    const offeredPrice = document.getElementById('offered-price').value;
    const message = document.getElementById('request-message').value.trim();
    const agreedTerms = document.getElementById('agree-terms').checked;

    // Validation
    if (!agreedTerms) {
      alertEl.innerHTML = '<div class="alert alert-error">Please agree to the terms and conditions.</div>';
      return;
    }

    if (offeredPrice && parseFloat(offeredPrice) <= 0) {
      alertEl.innerHTML = '<div class="alert alert-error">Offered price must be greater than 0.</div>';
      return;
    }

    if (offeredPrice && parseFloat(offeredPrice) >= parseFloat(currentListing.price)) {
      alertEl.innerHTML = '<div class="alert alert-error">Offered price must be less than the original price.</div>';
      return;
    }

    // Prepare request data
    const requestData = {
      listing_id: listingId,
      message: message
    };

    if (offeredPrice) {
      requestData.offered_price = parseFloat(offeredPrice);
    }

    // Send request
    alertEl.innerHTML = '<div class="alert alert-info">Sending request...</div>';

    const result = await API.createRequest(requestData);

    if (result.success) {
      alertEl.innerHTML = `
        <div class="alert alert-success">
          <strong>✅ Purchase request sent successfully!</strong><br>
          The admin will review your request and respond soon. 
          You can track the status in your <a href="dashboard.html" style="color: #155724; text-decoration: underline;">dashboard</a>.
        </div>
      `;
      
      // Clear form
      document.getElementById('offered-price').value = '';
      document.getElementById('request-message').value = '';
      document.getElementById('agree-terms').checked = false;
      document.getElementById('price-comparison').style.display = 'none';
    } else {
      alertEl.innerHTML = `<div class="alert alert-error"><strong>Error:</strong> ${result.message || 'Failed to send request. Please try again.'}</div>`;
    }
  }

  // Make function globally available
  window.sendPurchaseRequest = sendPurchaseRequest;

  // Initialize
  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Details — Honehube</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/listing-detail.css" />
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="detail-page" id="detail-page">
  <button class="back-btn" onclick="history.back()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Browse
  </button>
  <div id="detail-content"><p class="loading-msg">Loading item details...</p></div>
</div>

<script src="../assets/js/store.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/navbar.js"></script>
<script>
  const listingId = new URLSearchParams(location.search).get('id');
  if (!listingId) location.href = 'index.html';

  let currentUser = null;
  let currentListing = null;

  async function init() {
    renderNavbar();
    await HybridStore.init();
    currentUser = await HybridStore.getCurrentUser();
    await loadListing();
  }

  async function loadListing() {
    const page = document.getElementById('detail-content');
    
    // Get accessories (products) from Store
    const accessories = Store.getAccessories();
    currentListing = accessories.find(a => a.id == listingId);
    
    if (!currentListing) {
      page.innerHTML = '<p class="empty-msg">Item not found.</p>';
      return;
    }

    displayListing();
  }

  function displayListing() {
    const l = currentListing;
    const page = document.getElementById('detail-content');

    const isAvailable = l.status === 'available';
    const canPurchase = currentUser && currentUser.role !== 'admin' && isAvailable;

    page.innerHTML = `
      <div class="detail-container">
        <div class="detail-img">
          ${l.image ? `<img src="${l.image}" alt="${l.item_name}" onerror="this.parentElement.innerHTML='<div class=\\'detail-img-placeholder\\'>💻</div>'" />` : `<div class="detail-img-placeholder">💻</div>`}
        </div>
        <div class="detail-info">
          <div>
            <span class="badge badge-${l.status}">${l.status}</span>
          </div>
          <h1>${l.item_name}</h1>
          <p class="detail-price">K${parseFloat(l.original_price).toFixed(2)}</p>
          <p class="detail-category">📦 Category: ${l.category}</p>
          
          ${l.description ? `
            <div class="detail-desc">
              <strong>Description:</strong><br>
              ${l.description}
            </div>
          ` : ''}
          
          <div class="seller-box">
            <strong>👤 Seller:</strong> Admin
          </div>

          ${!isAvailable ? `
            <div class="alert alert-info">
              <strong>This item is no longer available.</strong><br>
              Status: ${l.status.charAt(0).toUpperCase() + l.status.slice(1)}
            </div>
          ` : ''}

          ${!currentUser && isAvailable ? `
            <div class="alert alert-info">
              <strong>Want to buy this item?</strong><br>
              Please <a href="login.html" style="color: #667eea; text-decoration: underline;">login</a> or 
              <a href="register.html" style="color: #667eea; text-decoration: underline;">register</a> to send a purchase request.
            </div>
          ` : ''}

          ${canPurchase ? `
            <div class="purchase-request-box">
              <h3>💰 Request to Buy</h3>
              <div id="request-alert"></div>
              
              <div class="form-group">
                <label>Your Offer Price (K) - Optional</label>
                <input type="number" id="offered-price" min="0.01" step="0.01" placeholder="Leave empty to buy at original price" />
                <small>Original price: K${parseFloat(l.original_price).toFixed(2)}. You can suggest a lower price for negotiation.</small>
              </div>

              <div id="price-comparison" style="display: none;"></div>

              <div class="form-group">
                <label>Message (Optional)</label>
                <textarea id="request-message" placeholder="Hi, I'm interested in this item..."></textarea>
                <small>Add any questions or comments for the seller.</small>
              </div>

              <div class="checkbox-group">
                <input type="checkbox" id="agree-terms" />
                <label for="agree-terms" style="font-weight: normal; margin: 0;">I agree to the terms and conditions</label>
              </div>

              <button class="btn btn-primary" onclick="sendPurchaseRequest()" style="width: 100%;">
                📧 Send Purchase Request
              </button>
            </div>

            <div class="purchase-request-box" style="margin-top: 20px; border-color: #dc3545;">
              <h3>⚠️ Report an Issue</h3>
              <p style="color: #666; font-size: 14px; margin-bottom: 15px;">
                If you've purchased this item and encountered a problem, you can report it here.
              </p>
              <button class="btn btn-secondary" onclick="showComplaintModal()" style="width: 100%; background: #dc3545; color: white;">
                📋 Report Issue with This Item
              </button>
            </div>
          ` : ''}
        </div>
      </div>
    `;

    // Add price comparison listener
    if (canPurchase) {
      document.getElementById('offered-price').addEventListener('input', updatePriceComparison);
    }
  }

  function updatePriceComparison() {
    const offeredPrice = parseFloat(document.getElementById('offered-price').value);
    const originalPrice = parseFloat(currentListing.original_price);
    const comparisonDiv = document.getElementById('price-comparison');

    if (offeredPrice && offeredPrice > 0 && offeredPrice < originalPrice) {
      const savings = originalPrice - offeredPrice;
      const savingsPercent = ((savings / originalPrice) * 100).toFixed(1);

      comparisonDiv.style.display = 'block';
      comparisonDiv.innerHTML = `
        <div class="price-item">
          <div class="price-item-label">Original Price</div>
          <div class="price-item-value">K${originalPrice.toFixed(2)}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">Your Offer</div>
          <div class="price-item-value">K${offeredPrice.toFixed(2)}</div>
        </div>
        <div class="price-item">
          <div class="price-item-label">You Save</div>
          <div class="price-item-value savings">K${savings.toFixed(2)}</div>
          <div class="savings">(${savingsPercent}% off)</div>
        </div>
      `;
    } else {
      comparisonDiv.style.display = 'none';
    }
  }

  async function sendPurchaseRequest() {
    const alertEl = document.getElementById('request-alert');
    const offeredPrice = document.getElementById('offered-price').value;
    const message = document.getElementById('request-message').value.trim();
    const agreedTerms = document.getElementById('agree-terms').checked;

    // Validation
    if (!agreedTerms) {
      alertEl.innerHTML = '<div class="alert alert-error">Please agree to the terms and conditions.</div>';
      return;
    }

    if (offeredPrice && parseFloat(offeredPrice) <= 0) {
      alertEl.innerHTML = '<div class="alert alert-error">Offered price must be greater than 0.</div>';
      return;
    }

    if (offeredPrice && parseFloat(offeredPrice) >= parseFloat(currentListing.original_price)) {
      alertEl.innerHTML = '<div class="alert alert-error">Offered price must be less than the original price.</div>';
      return;
    }

    // Prepare request data
    const requestData = {
      item_id: listingId,
      item_name: currentListing.item_name,
      original_price: currentListing.original_price,
      offered_price: offeredPrice ? parseFloat(offeredPrice) : null,
      message: message || `I'm interested in purchasing ${currentListing.item_name}`,
      student_id: currentUser.id,
      status: 'pending',
      created_at: new Date().toISOString()
    };

    // Send request using Store
    alertEl.innerHTML = '<div class="alert alert-info">Sending request...</div>';

    try {
      Store.addPurchaseRequest(requestData);
      
      alertEl.innerHTML = `
        <div class="alert alert-success">
          <strong>✅ Purchase request sent successfully!</strong><br>
          The admin will review your request and respond soon. 
          You can track the status in your <a href="dashboard.html" style="color: #155724; text-decoration: underline;">dashboard</a>.
        </div>
      `;
      
      // Clear form
      document.getElementById('offered-price').value = '';
      document.getElementById('request-message').value = '';
      document.getElementById('agree-terms').checked = false;
      document.getElementById('price-comparison').style.display = 'none';
    } catch (error) {
      alertEl.innerHTML = `<div class="alert alert-error"><strong>Error:</strong> Failed to send request. Please try again.</div>`;
    }
  }

  // Show complaint modal
  function showComplaintModal() {
    const modal = document.createElement('div');
    modal.id = 'complaint-modal';
    modal.innerHTML = `
      <div style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center;">
        <div style="background: white; padding: 30px; border-radius: 12px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto;">
          <h2 style="margin-top: 0;">📋 Report Issue with Item</h2>
          <p style="color: #666; margin-bottom: 20px;">
            Please describe the issue you're experiencing with this item. The admin will review your complaint and respond accordingly.
          </p>
          
          <div id="complaint-alert"></div>
          
          <form id="complaint-form">
            <div style="margin-bottom: 15px;">
              <label style="display: block; margin-bottom: 5px; font-weight: 600;">Issue Type *</label>
              <select id="complaint-type" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                <option value="">Select issue type</option>
                <option value="malfunction">Malfunction - Item not working properly</option>
                <option value="defect">Defect - Manufacturing or quality issue</option>
                <option value="not_as_described">Not as Described - Item differs from listing</option>
                <option value="damaged">Damaged - Item arrived damaged</option>
                <option value="other">Other - Different issue</option>
              </select>
            </div>
            
            <div style="margin-bottom: 15px;">
              <label style="display: block; margin-bottom: 5px; font-weight: 600;">Subject *</label>
              <input type="text" id="complaint-subject" required minlength="5" maxlength="200" placeholder="Brief description of the issue" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
              <small style="display: block; margin-top: 5px; color: #666;">Minimum 5 characters</small>
            </div>
            
            <div style="margin-bottom: 15px;">
              <label style="display: block; margin-bottom: 5px; font-weight: 600;">Detailed Description *</label>
              <textarea id="complaint-description" required minlength="10" rows="5" placeholder="Please provide detailed information about the issue..." style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; resize: vertical;"></textarea>
              <small style="display: block; margin-top: 5px; color: #666;">Minimum 10 characters. Include as much detail as possible.</small>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
              <button type="submit" class="btn btn-primary" style="flex: 1; background: #dc3545;">Submit Complaint</button>
              <button type="button" class="btn btn-secondary" onclick="closeComplaintModal()" style="flex: 1;">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    document.getElementById('complaint-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      await submitComplaint();
    });
  }

  // Submit complaint
  async function submitComplaint() {
    const alertEl = document.getElementById('complaint-alert');
    const complaintType = document.getElementById('complaint-type').value;
    const subject = document.getElementById('complaint-subject').value.trim();
    const description = document.getElementById('complaint-description').value.trim();

    // Validation
    if (!complaintType) {
      alertEl.innerHTML = '<div class="alert alert-error">Please select an issue type.</div>';
      return;
    }

    if (subject.length < 5) {
      alertEl.innerHTML = '<div class="alert alert-error">Subject must be at least 5 characters.</div>';
      return;
    }

    if (description.length < 10) {
      alertEl.innerHTML = '<div class="alert alert-error">Description must be at least 10 characters.</div>';
      return;
    }

    // Prepare complaint data
    const complaintData = {
      item_id: listingId,
      item_name: currentListing.item_name,
      complaint_type: complaintType,
      subject: subject,
      description: description,
      user_id: currentUser.id,
      status: 'pending',
      created_at: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };

    // Send complaint
    alertEl.innerHTML = '<div class="alert alert-info">Submitting complaint...</div>';

    try {
      Store.addComplaint(complaintData);
      
      alertEl.innerHTML = `
        <div class="alert alert-success">
          <strong>✅ Complaint submitted successfully!</strong><br>
          Your complaint has been received. The admin will review it and respond soon.
          You can track the status in your <a href="dashboard.html" style="color: #155724; text-decoration: underline;">dashboard</a>.
        </div>
      `;
      
      // Clear form
      document.getElementById('complaint-type').value = '';
      document.getElementById('complaint-subject').value = '';
      document.getElementById('complaint-description').value = '';
      
      // Close modal after 3 seconds
      setTimeout(() => {
        closeComplaintModal();
      }, 3000);
    } catch (error) {
      alertEl.innerHTML = `<div class="alert alert-error"><strong>Error:</strong> Failed to submit complaint. Please try again.</div>`;
    }
  }

  // Close complaint modal
  function closeComplaintModal() {
    const modal = document.getElementById('complaint-modal');
    if (modal) {
      modal.remove();
    }
  }

  // Make functions globally available
  window.sendPurchaseRequest = sendPurchaseRequest;
  window.showComplaintModal = showComplaintModal;
  window.closeComplaintModal = closeComplaintModal;

  // Initialize
  init();
</script>
</body>
</html>

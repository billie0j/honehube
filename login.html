<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Honehub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar" id="navbar"></nav>

<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-header">
      <div class="auth-icon">💻</div>
      <h2>Welcome back</h2>
      <p>Sign in to Honehube — Evlyne Hone College</p>
    </div>

    <div class="login-hint">
      Login with your <strong>college email</strong> (e.g. <strong>b123456@evlynehone.ac.zw</strong>),
      your <strong>student ID</strong>, or any <strong>email</strong> (e.g. <strong>enock@gmail.com</strong>).
    </div>

    <div id="alert"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email or Student ID</label>
        <input type="text" id="email" placeholder="b123456@evlynehone.ac.zw or B123456" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-eye">
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="eye-btn" onclick="togglePassword()" aria-label="Toggle password">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <label>
          <input type="checkbox" id="remember" />
          Remember me
        </label>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="register.html">Register</a></p>
  </div>
</div>

<script src="js/store.js"></script>
<script>
  renderNavbar();

  // Pre-fill if remembered
  const remembered = localStorage.getItem('hh_remember');
  if (remembered) {
    document.getElementById('email').value    = remembered;
    document.getElementById('remember').checked = true;
  }

  function handleLogin(e) {
    e.preventDefault();
    const alertEl  = document.getElementById('alert');
    const remember = document.getElementById('remember').checked;
    const rawInput = document.getElementById('email').value.trim();
    alertEl.innerHTML = '';

    // if input looks like a student ID (no @), convert to email
    const emailInput = rawInput.includes('@') ? rawInput : `${rawInput.toLowerCase()}@evlynehone.ac.zw`;

    try {
      const user = loginUser(emailInput, document.getElementById('password').value);

      if (remember) {
        localStorage.setItem('hh_remember', rawInput);
      } else {
        localStorage.removeItem('hh_remember');
      }

      saveAuth(user);
      location.href = user.role === 'admin' ? 'admin/dashboard.html' : 'buyer/dashboard.html';
    } catch (err) {
      alertEl.innerHTML = `<div class="alert alert-error">${err.error || 'Login failed'}</div>`;
    }
  }

  function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eye-icon');
    const show  = input.type === 'password';
    input.type  = show ? 'text' : 'password';
    icon.innerHTML = show
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
         <circle cx="12" cy="12" r="3"/>`;
  }
</script>
</body>
</html>

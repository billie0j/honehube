<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=frontend/pages/home.html">
  <title>Honehube - Evelyn Hone College Laptop Marketplace</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
    }
    .container {
      padding: 40px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    a {
      color: white;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💻 Honehube</h1>
    <p>Evelyn Hone College Laptop Marketplace</p>
    <div class="loader"></div>
    <p style="margin-top: 30px; font-size: 1rem;">Redirecting to home page...</p>
    <p style="font-size: 0.9rem;">
      If you are not redirected, <a href="frontend/pages/home.html">click here</a>
    </p>
  </div>
  
  <script>
    // Redirect after 1 second
    setTimeout(() => {
      window.location.href = 'frontend/pages/home.html';
    }, 1000);
  </script>
</body>
</html>
